[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = arduino
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.11.0
	adafruit/Adafruit BNO055@^1.6.1
	adafruit/Adafruit Unified Sensor@^1.1.9
	SPI
	adafruit/Adafruit BusIO@^1.14.4